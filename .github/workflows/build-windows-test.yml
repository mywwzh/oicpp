name: Build .exe to test

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Installer version override (e.g., 1.4.1)"
        required: false

permissions:
  contents: read

jobs:
  build-windows-test:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        shell: powershell
        run: |
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch' -and "${{ github.event.inputs.version }}" -ne '') {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8
          Write-Host "Using VERSION=$version"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Install dependencies
        run: npm install --include=optional

      - name: Verify node-pty windows binary
        shell: powershell
        run: |
          @'
          const fs = require("fs");
          const path = require("path");
          const pkg = path.dirname(require.resolve("node-pty/package.json"));
          const platformDir = `win32-${process.arch}`;
          const candidates = [
            path.join(pkg, "prebuilds", platformDir, "pty.node"),
            path.join(pkg, "build", "Release", "pty.node"),
            path.join(pkg, "build", "Debug", "pty.node")
          ];
          console.log("node-pty path:", pkg);
          console.log("check candidates:", candidates);
          if (!fs.existsSync(path.join(pkg, "lib", "index.js"))) {
            throw new Error("node-pty lib/index.js missing; terminal will be unavailable in Windows package.");
          }
          if (!candidates.some((file) => fs.existsSync(file))) {
            throw new Error("node-pty windows native binary missing; terminal will be unavailable in Windows package.");
          }
          '@ | node

      - name: Build Unpacked App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Verify packaged node-pty in app.asar.unpacked
        shell: powershell
        run: |
          @'
          const fs = require("fs");
          const path = require("path");
          const root = path.join(process.cwd(), "dist", "win-unpacked", "resources", "app.asar.unpacked", "node_modules", "node-pty");
          const platformDir = `win32-${process.arch}`;
          const indexFile = path.join(root, "lib", "index.js");
          const nativeCandidates = [
            path.join(root, "prebuilds", platformDir, "pty.node"),
            path.join(root, "build", "Release", "pty.node"),
            path.join(root, "build", "Debug", "pty.node")
          ];
          const sidecarCandidates = [
            path.join(root, "prebuilds", platformDir, "winpty-agent.exe"),
            path.join(root, "prebuilds", platformDir, "conpty", "OpenConsole.exe")
          ];
          console.log("packaged node-pty root:", root);
          if (!fs.existsSync(indexFile)) {
            throw new Error("packaged node-pty lib/index.js missing in app.asar.unpacked. Ensure asarUnpack includes node_modules/node-pty/**/*.");
          }
          if (!nativeCandidates.some((file) => fs.existsSync(file))) {
            throw new Error("packaged node-pty native binary missing in app.asar.unpacked.");
          }
          if (!sidecarCandidates.some((file) => fs.existsSync(file))) {
            throw new Error("packaged node-pty runtime sidecar missing in app.asar.unpacked.");
          }
          '@ | node

      - name: Prepare and Build Installer
        shell: powershell
        run: |
          $version = $env:VERSION
          Write-Host "Building version: $version"
          $nsiPath = "installer.nsi"
          $content = Get-Content $nsiPath -Raw

          $content = $content -replace '!define PRODUCT_VERSION ".*"', "!define PRODUCT_VERSION \"$version\""
          $content = $content -replace 'OutFile "OICPP-.*-Setup.exe"', "OutFile \"OICPP-$version-Setup.exe\""
          $content | Set-Content $nsiPath -Encoding UTF8

          Copy-Item "ConsolePauser.exe" -Destination "dist\win-unpacked\" -Force
          Copy-Item "oicpp.ico" -Destination "dist\win-unpacked\" -Force

          makensis installer.nsi

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-artifacts
          path: OICPP-*-Setup.exe
          if-no-files-found: error
