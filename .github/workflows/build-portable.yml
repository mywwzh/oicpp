name: Build Portable Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Portable version override (e.g., 1.4.4)"
        required: false
      platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - windows
          - all
        default: windows

permissions:
  contents: read

jobs:
  build-windows-portable:
    if: github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'all'
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        shell: powershell
        run: |
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch' -and "${{ github.event.inputs.version }}" -ne '') {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8
          Write-Host "Using VERSION=$version"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis -y --no-progress
          if (Test-Path "C:\Program Files (x86)\NSIS\makensis.exe") {
            Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files (x86)\NSIS"
          } elseif (Test-Path "C:\Program Files\NSIS\makensis.exe") {
            Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\NSIS"
          }
          $nsisPath = (Get-Command makensis -ErrorAction SilentlyContinue).Source
          if (-not $nsisPath) {
            Write-Warning "makensis not found on PATH, trying explicit lookup"
            $candidates = @(
              "C:\Program Files (x86)\NSIS\makensis.exe",
              "C:\Program Files\NSIS\makensis.exe"
            )
            $found = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
            if ($found) {
              Add-Content -Path $env:GITHUB_PATH -Value (Split-Path $found -Parent)
              Write-Host "Added NSIS path: $(Split-Path $found -Parent)"
            } else {
              Write-Error "NSIS installation failed - makensis.exe not found"
            }
          }

      - name: Install dependencies
        run: npm install --include=optional

      - name: Prepare clangd bundle
        run: npm run prebuild:clangd

      - name: Verify node-pty windows binary
        shell: powershell
        run: |
          @'
          const fs = require("fs");
          const path = require("path");
          const pkg = path.dirname(require.resolve("node-pty/package.json"));
          const platformDir = `win32-${process.arch}`;
          const candidates = [
            path.join(pkg, "prebuilds", platformDir, "pty.node"),
            path.join(pkg, "build", "Release", "pty.node"),
            path.join(pkg, "build", "Debug", "pty.node")
          ];
          console.log("node-pty path:", pkg);
          console.log("check candidates:", candidates);
          if (!fs.existsSync(path.join(pkg, "lib", "index.js"))) {
            throw new Error("node-pty lib/index.js missing; terminal will be unavailable in Windows package.");
          }
          if (!candidates.some((file) => fs.existsSync(file))) {
            throw new Error("node-pty windows native binary missing; terminal will be unavailable in Windows package.");
          }
          '@ | node

      - name: Build Unpacked App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Verify packaged node-pty in app.asar.unpacked
        shell: powershell
        run: |
          @'
          const fs = require("fs");
          const path = require("path");
          const root = path.join(process.cwd(), "dist", "win-unpacked", "resources", "app.asar.unpacked", "node_modules", "node-pty");
          const platformDir = `win32-${process.arch}`;
          const indexFile = path.join(root, "lib", "index.js");
          const nativeCandidates = [
            path.join(root, "prebuilds", platformDir, "pty.node"),
            path.join(root, "build", "Release", "pty.node"),
            path.join(root, "build", "Debug", "pty.node")
          ];
          const sidecarCandidates = [
            path.join(root, "prebuilds", platformDir, "winpty-agent.exe"),
            path.join(root, "prebuilds", platformDir, "conpty", "OpenConsole.exe")
          ];
          console.log("packaged node-pty root:", root);
          if (!fs.existsSync(indexFile)) {
            throw new Error("packaged node-pty lib/index.js missing in app.asar.unpacked. Ensure asarUnpack includes node_modules/node-pty/**/*..");
          }
          if (!nativeCandidates.some((file) => fs.existsSync(file))) {
            throw new Error("packaged node-pty native binary missing in app.asar.unpacked.");
          }
          if (!sidecarCandidates.some((file) => fs.existsSync(file))) {
            throw new Error("packaged node-pty runtime sidecar missing in app.asar.unpacked.");
          }
          '@ | node

      - name: Prepare portable version
        shell: powershell
        run: |
          $version = $env:VERSION
          $portableDir = "dist\OICPP-Portable-$version"
          
          # Create portable directory structure
          Write-Host "Creating portable directory: $portableDir"
          if (Test-Path $portableDir) {
            Remove-Item $portableDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $portableDir -Force | Out-Null
          
          # Copy unpacked files
          Write-Host "Copying unpacked files..."
          Get-ChildItem "dist\win-unpacked" -Exclude "*.exe" | Copy-Item -Destination $portableDir -Recurse -Force
          
          # Copy main executable
          Copy-Item "dist\win-unpacked\OICPP IDE.exe" -Destination $portableDir -Force
          
          # Copy additional required files
          Copy-Item "ConsolePauser.exe" -Destination $portableDir -Force
          Copy-Item "oicpp.ico" -Destination $portableDir -Force
          
          # Create PORTABLE marker file
          Write-Host "Creating PORTABLE marker file..."
          New-Item -ItemType File -Path "$portableDir\PORTABLE" -Force | Out-Null
          
          # Copy portable readme
          if (Test-Path "PORTABLE_README.md") {
            Copy-Item "PORTABLE_README.md" -Destination "$portableDir\PORTABLE_README.md" -Force
          }
          
          # Create data and LSP directories (will be populated on first run)
          New-Item -ItemType Directory -Path "$portableDir\data" -Force | Out-Null
          New-Item -ItemType Directory -Path "$portableDir\LSP" -Force | Out-Null
          
          Write-Host "Portable version prepared successfully"
          Write-Host "Directory contents:"
          Get-ChildItem $portableDir | Select-Object Name, Length, LastWriteTime

      - name: Create portable zip archive
        shell: powershell
        run: |
          $version = $env:VERSION
          $portableDir = "dist\OICPP-Portable-$version"
          $zipName = "OICPP-$version-Portable.zip"
          
          Write-Host "Creating zip archive: $zipName"
          
          # Use 7-Zip for better compression
          $sevenZipPath = "C:\Program Files\7-Zip\7z.exe"
          if (Test-Path $sevenZipPath) {
            & $sevenZipPath a -tzip "$zipName" "$portableDir\*" -r
          } else {
            # Fallback to PowerShell Compress-Archive
            Compress-Archive -Path "$portableDir\*" -DestinationPath $zipName -Force
          }
          
          Write-Host "Zip archive created: $zipName"
          $zipSize = (Get-Item $zipName).Length / 1MB
          Write-Host "Zip file size: $([math]::Round($zipSize, 2)) MB"

      - name: Upload portable zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-artifact
          path: OICPP-*-Portable.zip
          if-no-files-found: error

  build-linux-portable:
    if: github.event.inputs.platform == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        shell: bash
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Using VERSION=$VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install --include=optional

      - name: Prepare clangd bundle
        run: npm run prebuild:clangd

      - name: Build Unpacked App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Prepare portable version
        shell: bash
        run: |
          VERSION=$VERSION
          PORTABLE_DIR="dist/OICPP-Portable-$VERSION"
          
          echo "Creating portable directory: $PORTABLE_DIR"
          rm -rf "$PORTABLE_DIR"
          mkdir -p "$PORTABLE_DIR"
          
          echo "Copying unpacked files..."
          cp -r dist/linux-unpacked/* "$PORTABLE_DIR/"
          
          echo "Creating PORTABLE marker file..."
          touch "$PORTABLE_DIR/PORTABLE"
          
          if [ -f "PORTABLE_README.md" ]; then
            cp "PORTABLE_README.md" "$PORTABLE_DIR/"
          fi
          
          mkdir -p "$PORTABLE_DIR/data"
          mkdir -p "$PORTABLE_DIR/LSP"
          
          echo "Portable version prepared successfully"
          ls -la "$PORTABLE_DIR"

      - name: Create portable tar.gz archive
        shell: bash
        run: |
          VERSION=$VERSION
          PORTABLE_DIR="dist/OICPP-Portable-$VERSION"
          TAR_NAME="OICPP-$VERSION-Portable-linux-x64.tar.gz"
          
          echo "Creating tar.gz archive: $TAR_NAME"
          tar -czvf "$TAR_NAME" -C "$PORTABLE_DIR" .
          
          echo "Archive created: $TAR_NAME"
          TAR_SIZE=$(du -h "$TAR_NAME" | cut -f1)
          echo "Archive size: $TAR_SIZE"

      - name: Upload portable tar.gz artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-portable-artifact
          path: OICPP-*-Portable-linux-x64.tar.gz
          if-no-files-found: error

  build-mac-portable:
    if: github.event.inputs.platform == 'all'
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        shell: bash
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Using VERSION=$VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install --include=optional

      - name: Prepare clangd bundle
        run: npm run prebuild:clangd

      - name: Build Unpacked App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Prepare portable version
        shell: bash
        run: |
          VERSION=$VERSION
          PORTABLE_DIR="dist/OICPP-Portable-$VERSION"
          
          echo "Creating portable directory: $PORTABLE_DIR"
          rm -rf "$PORTABLE_DIR"
          mkdir -p "$PORTABLE_DIR"
          
          echo "Copying unpacked files..."
          cp -r dist/mac-unpacked/* "$PORTABLE_DIR/"
          
          echo "Creating PORTABLE marker file..."
          touch "$PORTABLE_DIR/PORTABLE"
          
          if [ -f "PORTABLE_README.md" ]; then
            cp "PORTABLE_README.md" "$PORTABLE_DIR/"
          fi
          
          mkdir -p "$PORTABLE_DIR/data"
          mkdir -p "$PORTABLE_DIR/LSP"
          
          echo "Portable version prepared successfully"
          ls -la "$PORTABLE_DIR"

      - name: Create portable zip archive
        shell: bash
        run: |
          VERSION=$VERSION
          PORTABLE_DIR="dist/OICPP-Portable-$VERSION"
          ZIP_NAME="OICPP-$VERSION-Portable-macos-x64.zip"
          
          echo "Creating zip archive: $ZIP_NAME"
          zip -r "$ZIP_NAME" "$PORTABLE_DIR"
          
          echo "Archive created: $ZIP_NAME"
          ZIP_SIZE=$(du -h "$ZIP_NAME" | cut -f1)
          echo "Archive size: $ZIP_SIZE"

      - name: Upload portable zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-portable-artifact
          path: OICPP-*-Portable-macos-x64.zip
          if-no-files-found: error
